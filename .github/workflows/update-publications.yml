name: Update publications

on:
  schedule:
    # First day of each month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch publications
        run: python scripts/fetch_publications.py

      - name: Update profile README
        run: python scripts/update_profile_publications.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/data/publications.json profile/README.md
          if git diff --staged --quiet; then
            echo "No publication changes to commit."
          else
            git commit -m "Update recent publications from Google Scholar [automated]"
            git push
          fi
