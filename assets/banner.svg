<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="45" x2="900" y2="45"/>
    <line x1="0" y1="90" x2="900" y2="90"/>
    <line x1="0" y1="135" x2="900" y2="135"/>
    <line x1="150" y1="0" x2="150" y2="180"/>
    <line x1="300" y1="0" x2="300" y2="180"/>
    <line x1="450" y1="0" x2="450" y2="180"/>
    <line x1="600" y1="0" x2="600" y2="180"/>
    <line x1="750" y1="0" x2="750" y2="180"/>
  </g>

  <!-- Network edges -->
  <g stroke="url(#edgeGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="120" y1="90" x2="250" y2="45"/>
    <line x1="120" y1="90" x2="250" y2="135"/>
    <line x1="250" y1="45" x2="400" y2="70"/>
    <line x1="250" y1="135" x2="400" y2="110"/>
    <line x1="400" y1="70" x2="550" y2="50"/>
    <line x1="400" y1="110" x2="550" y2="130"/>
    <line x1="400" y1="70" x2="550" y2="90"/>
    <line x1="400" y1="110" x2="550" y2="90"/>
    <line x1="550" y1="50" x2="700" y2="60"/>
    <line x1="550" y1="130" x2="700" y2="120"/>
    <line x1="550" y1="90" x2="700" y2="90"/>
    <line x1="700" y1="60" x2="780" y2="90"/>
    <line x1="700" y1="120" x2="780" y2="90"/>
    <line x1="250" y1="45" x2="400" y2="110"/>
    <line x1="250" y1="135" x2="400" y2="70"/>
  </g>

  <!-- Animated pulse along edges -->
  <g fill="#a78bfa" filter="url(#glow)">
    <circle r="3">
      <animateMotion dur="4s" repeatCount="indefinite" path="M120,90 L250,45 L400,70 L550,50 L700,60 L780,90"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion dur="5s" repeatCount="indefinite" begin="1s" path="M120,90 L250,135 L400,110 L550,130 L700,120 L780,90"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle r="2.5">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="2s" path="M400,70 L550,90 L700,90 L780,90"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3.5s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </g>

  <!-- Network nodes -->
  <g filter="url(#glow)">
    <!-- Hub node (centre) -->
    <circle cx="550" cy="90" r="14" fill="url(#nodeGlow)">
      <animate attributeName="r" values="14;16;14" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="90" r="6" fill="#ede9fe"/>

    <!-- Other nodes with subtle pulse -->
    <circle cx="120" cy="90" r="10" fill="#6366f1" opacity="0.9">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="45" r="8" fill="#818cf8" opacity="0.85">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="250" cy="135" r="8" fill="#818cf8" opacity="0.85">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="400" cy="70" r="9" fill="#7c3aed" opacity="0.9">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="400" cy="110" r="9" fill="#7c3aed" opacity="0.9">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="550" cy="50" r="7" fill="#a78bfa" opacity="0.8">
      <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.2s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="550" cy="130" r="7" fill="#a78bfa" opacity="0.8">
      <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.2s" repeatCount="indefinite" begin="1.7s"/>
    </circle>
    <circle cx="700" cy="60" r="8" fill="#6366f1" opacity="0.85">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="700" cy="120" r="8" fill="#6366f1" opacity="0.85">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="780" cy="90" r="10" fill="url(#nodeGlow)" opacity="0.9">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>

  <!-- Labels -->
  <text x="450" y="168" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" letter-spacing="3">NETWORK · MULTI-OMICS · EXPLAINABLE AI</text>
</svg>
